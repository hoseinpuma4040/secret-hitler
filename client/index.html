<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secret Hitler</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Secret Hitler</h1>

<!-- ===== LOBBY ===== -->
<div id="lobby">
  <h2>Online lobby</h2>

  <input id="playerNameInput" placeholder="Player name">
  <input id="roomCodeInput" placeholder="Room code">

  <br><br>

  <button id="createRoomBtn">Create Room</button>
  <button id="joinRoomBtn">Join Room</button>

  <h3>Room code</h3>
  <div id="roomCodeDisplay">—</div>
  <button id="copyCodeBtn">Copy code</button>

  <h3>Players</h3>
  <ul id="playerList"></ul>

  <p>5–10 players required to start</p>
  <button id="startGameBtn">Start Game</button>

  <p><b>Private — do not share this screen</b></p>
</div>

<hr>

<!-- ===== GAME ===== -->
<div id="game" style="display: none;">

  <h3>Room: <span id="boardRoomCode">—</span></h3>
  <h3>Round: <span id="boardRound">—</span></h3>

  <p id="gameStatus">Waiting…</p>

  <!-- ===== BOARD ===== -->
  <div class="board">

    <!-- LIBERAL -->
    <div class="board-section liberal">
      <div class="board-title">LIBERAL</div>
      <div class="track liberal-track" id="liberalTrack">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <!-- FASCIST -->
    <div class="board-section fascist">
      <div class="board-title">FASCIST</div>
      <div class="track fascist-track" id="fascistTrack">
        <div class="slot"></div>
        <div class="slot investigate"></div>
        <div class="slot peek"></div>
        <div class="slot kill"></div>
        <div class="slot kill"></div>
        <div class="slot hitler"></div>
      </div>
    </div>

    <!-- ELECTION TRACKER -->
    <div class="election-tracker" id="electionTracker">
      <div class="tracker-slot"></div>
      <div class="tracker-slot"></div>
      <div class="tracker-slot"></div>
    </div>

  </div>

  <!-- ===== GOVERNMENT ===== -->
  <h3>Government</h3>
  <p>President: <span id="presidentName">—</span></p>
  <p>Chancellor: <span id="chancellorName">—</span></p>

  <!-- ===== PLAYERS ===== -->
  <h3>Players</h3>
  <ul id="boardPlayerList"></ul>

  <!-- ===== ACTIONS ===== -->
  <div id="actionPrompt"></div>
  <div id="actionButtons"></div>

  <!-- ===== REACTIONS ===== -->
  <div id="reactions">👍 🤨 😳 ❌</div>

  <!-- ===== PRIVATE ===== -->
  <h3>Private info</h3>
  <div id="privateInfo"></div>

  <button id="continueBtn">Continue</button>

</div>

<!-- ✅ IMPORTANT (socket + game) -->
<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
